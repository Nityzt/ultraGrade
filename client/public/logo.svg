<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ultraGrade">
  <defs>
    <radialGradient id="bloom" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#b5cdb7" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#b5cdb7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#b5cdb7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="board" x1="102" y1="150" x2="410" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d1e9d2"/>
      <stop offset="100%" stop-color="#b5cdb7"/>
    </linearGradient>
  </defs>

  <!-- obsidian tile + ambient sage bloom -->
  <rect width="512" height="512" rx="112" fill="#0d1117"/>
  <rect width="512" height="512" rx="112" fill="url(#bloom)"/>

