  <!-- button + tassel (sand accent) -->
  <circle cx="256" cy="216" r="11" fill="#16281a"/>
  <path d="M256 216 L404 216" stroke="#f7bb7e" stroke-width="7" stroke-linecap="round"/>
  <path d="M404 216 L404 322" stroke="#f7bb7e" stroke-width="7" stroke-linecap="round"/>
  <circle cx="404" cy="332" r="15" fill="#f7bb7e"/>
